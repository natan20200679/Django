{% extends 'pdv/base.html' %}

{% load static %}

{% block extra_styles %}
<link rel="stylesheet" type="text/css" href="{% static 'formularios/formularios.css' %}">
{% endblock %}

{% block content %}
<h2>Editar Cliente</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Salvar Alterações</button>
    <a href="{% url 'clientes' %}">Cancelar</a>
</form>
{% endblock %}

{% extends "pdv/base.html" %}
{% block content %}
    <div>
        <h2>Confirmar Exclusão</h2>

        <p>Tem certeza que deseja excluir o cliente <strong>{{ cliente.nome }}</strong>?</p>
        <p>Esta ação não poderá ser desfeita.</p>

        <!-- Este formulário envia o POST que ativa a exclusão no banco -->
        <form method="POST" action="{% url 'excluir_cliente' cliente.id %}">
            {% csrf_token %}

            <button type="submit" class="btn btn-danger">Sim, desejo excluir</button>

            <!-- Botão para voltar caso o usuário desista -->
            <a href="{% url 'clientes' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
{% endblock %}

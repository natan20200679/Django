{% extends 'pdv/base.html' %}
{% block content %}
    <div class="titulo">
        <h3>Excluir Cliente</h3>
    </div>
    <p>
        Tem certeza de que deseja excluir o(a) cliente <strong>{{ cliente.nome }}</strong> selecionado(a)?
    </p>
    <form method="post" action="{% url 'excluir_cliente' cliente.id %}">
        {% csrf_token %}
        <button type="submit" class="btn">Sim, excluir</button>
        <a href="{% url 'clientes' %}" class="btn">Cancelar</a>
    </form>
{% endblock %}
